name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "apps/reflex/**"
      - "apps/extension/public/manifest.json"
      - "apps/native-host/**"
      - "installer/npx/**"
      - "packages/sdk/**"
      - "packages/ui/**"
      - "scripts/package-bridge.mjs"
      - "scripts/smoke-codemask-installer.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  pull_request:
    paths:
      - "apps/docs/**"
      - "apps/reflex/**"
      - "apps/extension/public/manifest.json"
      - "apps/native-host/**"
      - "installer/npx/**"
      - "packages/sdk/**"
      - "packages/ui/**"
      - "scripts/package-bridge.mjs"
      - "scripts/smoke-codemask-installer.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: docs
            workspace: "@window-codex/docs"
            project: window-codex-docs
          - app: reflex
            workspace: "@window-codex/reflex"
            project: window-codex-reflex
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build shared SDK
        run: npm run build -w @window-codex/sdk
      - name: Package Codemask bridge installer
        if: matrix.app == 'docs'
        run: |
          npm run package:bridge
          mkdir -p apps/docs/public/downloads
          cp release-assets/codemask-bridge.tgz apps/docs/public/downloads/codemask-bridge.tgz
      - name: Build ${{ matrix.app }}
        run: npm run build -w ${{ matrix.workspace }}
      - name: Deploy ${{ matrix.app }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy apps/${{ matrix.app }}/dist --project-name=${{ matrix.project }} --branch=${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
