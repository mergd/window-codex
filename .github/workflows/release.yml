name: Release tarballs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run release:pack
      - name: Create GitHub release and upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/*.tgz
          release-assets/*.zip
          --generate-notes
          --title "Codemask ${GITHUB_REF_NAME}"
